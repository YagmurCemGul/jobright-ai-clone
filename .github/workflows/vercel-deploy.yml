name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID}}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod' # Production dağıtımı için
          working-directory: ./client # Specifies that the project is in the client directory
        env:
          # You need to define REACT_APP_API_URL in your Vercel project's Environment Variables settings.
          # This secret should be the URL of your Heroku backend.
          # Example: https://your-heroku-app.herokuapp.com/api
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}